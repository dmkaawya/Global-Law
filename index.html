<!DOCTYPE html>
<html lang="en" class="">
<head>
  <!-- =============================================
       GlobalLaw - Country Selector (Landing Page)
       When user selects a country → redirects to that country's file
       e.g., Sri Lanka → lk.html
       ============================================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlobalLaw - Select Your Country</title>
  <meta name="description" content="Know Your Rights. Understand the Law. Select your country to browse local laws.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              red: '#DC2626',
              'red-light': '#EF4444',
              'red-dark': '#B91C1C',
              dark: '#050505',
              'dark-card': '#1A1A1A',
              'dark-border': '#262626',
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    html { scroll-behavior: smooth; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #DC2626; border-radius: 3px; }

    .country-card {
      transition: all 0.3s ease;
    }
    .country-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(220, 38, 38, 0.15);
    }
    .country-card.available {
      cursor: pointer;
    }
    .country-card.available:hover {
      border-color: #DC2626;
    }
    .country-card.soon {
      cursor: not-allowed;
      opacity: 0.6;
    }
    .country-card.soon:hover {
      transform: none;
      box-shadow: none;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.6s ease forwards; }
    .fade-in-d1 { animation-delay: 0.1s; opacity: 0; }
    .fade-in-d2 { animation-delay: 0.2s; opacity: 0; }
    .fade-in-d3 { animation-delay: 0.3s; opacity: 0; }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .toast-slide { animation: slideInRight 0.4s ease forwards; }

    /* Background dot pattern */
    .dot-bg {
      background-image: radial-gradient(circle at 1px 1px, #DC2626 1px, transparent 0);
      background-size: 40px 40px;
    }
  </style>
</head>

<body class="bg-white dark:bg-brand-dark text-neutral-900 dark:text-neutral-100 transition-colors duration-300 min-h-screen flex flex-col">

  <!-- =============================================
       TOP BAR: Logo + Dark/Light Toggle
       ============================================= -->
  <header class="sticky top-0 z-50 bg-white/90 dark:bg-brand-dark/90 backdrop-blur-md border-b border-neutral-200 dark:border-brand-dark-border">
    <div class="max-w-7xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between">
      <!-- Logo -->
      <a href="index.html" class="text-xl md:text-2xl font-extrabold tracking-tight">
        <span class="text-brand-red">Global</span><span class="dark:text-white text-neutral-900">Law</span>
      </a>

      <!-- Dark/Light Toggle -->
      <button onclick="toggleDarkMode()" class="flex items-center justify-center w-9 h-9 rounded-full hover:bg-neutral-100 dark:hover:bg-brand-dark-card transition" title="Toggle Theme">
        <i data-lucide="sun" class="w-[18px] h-[18px] hidden dark:block text-yellow-400"></i>
        <i data-lucide="moon" class="w-[18px] h-[18px] block dark:hidden text-neutral-600"></i>
      </button>
    </div>
  </header>


  <!-- =============================================
       MAIN CONTENT: Country Selector
       ============================================= -->
  <main class="flex-1 flex items-center justify-center relative overflow-hidden">
    <!-- Background Pattern -->
    <div class="absolute inset-0 dot-bg opacity-[0.02] dark:opacity-[0.04]"></div>
    <!-- Red Glow -->
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-brand-red/5 dark:bg-brand-red/3 rounded-full blur-[100px]"></div>

    <div class="relative w-full max-w-3xl mx-auto px-4 md:px-6 py-12 md:py-16 text-center">

      <!-- Headline -->
      <div class="mb-10">
        <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight leading-tight mb-4 fade-in">
          <span>Know Your Rights.</span><br>
          <span class="text-brand-red">Understand the Law.</span>
        </h1>
        <p class="text-neutral-500 dark:text-neutral-400 text-base md:text-lg max-w-md mx-auto fade-in fade-in-d1">
          Select your country to browse local laws explained simply
        </p>
      </div>

      <!-- Country Grid -->
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 md:gap-4 fade-in fade-in-d2">

        <!-- 🇱🇰 Sri Lanka — AVAILABLE -->
        <button onclick="goToCountry('notwork.html')" class="country-card available bg-neutral-50 dark:bg-brand-dark-card border border-neutral-200 dark:border-brand-dark-border rounded-xl p-4 md:p-5 text-center group">
          <div class="text-3xl md:text-4xl mb-2">🇱🇰</div>
          <div class="font-semibold text-sm md:text-base">Sri Lanka</div>
          <div class="text-xs text-neutral-400 mt-1">ශ්‍රී ලංකාව</div>
          <div class="mt-2 text-[10px] font-bold text-brand-red bg-red-50 dark:bg-red-900/20 px-2 py-0.5 rounded-full inline-block">✓ Available</div>
        </button>

        <!-- 🇺🇸 United States — COMING SOON -->
        <button onclick="comingSoon('United States')" class="country-card soon bg-neutral-50 dark:bg-brand-dark-card border border-neutral-200 dark:border-brand-dark-border rounded-xl p-4 md:p-5 text-center">
          <div class="text-3xl md:text-4xl mb-2">🇺🇸</div>
          <div class="font-semibold text-sm md:text-base">United States</div>
          <div class="text-xs text-neutral-400 mt-1">USA</div>
          <div class="mt-2 text-[10px] font-bold text-neutral-400 bg-neutral-100 dark:bg-neutral-800 px-2 py-0.5 rounded-full inline-block">Coming Soon</div>
        </button>

        <!-- 🇬🇧 United Kingdom — COMING SOON -->
        <button onclick="comingSoon('United Kingdom')" class="country-card soon bg-neutral-50 dark:bg-brand-dark-card border border-neutral-200 dark:border-brand-dark-border rounded-xl p-4 md:p-5 text-center">
          <div class="text-3xl md:text-4xl mb-2">🇬🇧</div>
          <div class="font-semibold text-sm md:text-base">United Kingdom</div>
          <div class="text-xs text-neutral-400 mt-1">UK</div>
          <div class="mt-2 text-[10px] font-bold text-neutral-400 bg-neutral-100 dark:bg-neutral-800 px-2 py-0.5 rounded-full inline-block">Coming Soon</div>
        </button>

        <!-- 🇮🇳 India — COMING SOON -->
        <button onclick="comingSoon('India')" class="country-card soon bg-neutral-50 dark:bg-brand-dark-card border border-neutral-200 dark:border-brand-dark-border rounded-xl p-4 md:p-5 text-center">
          <div class="text-3xl md:text-4xl mb-2">🇮🇳</div>
          <div class="font-semibold text-sm md:text-base">India</div>

          <div class="mt-2 text-[10px] font-bold text-neutral-400 bg-neutral-100 dark:bg-neutral-800 px-2 py-0.5 rounded-full inline-block">Coming Soon</div>

        <!-- 🇰🇷 South Korea — COMING SOON -->

          <div class="text-3xl md:text-4xl mb-2">🇰🇷</div>
          <div class="font-semibold text-sm md:text-base">South Korea</div>
          <div class="text-xs text-neutral-400 mt-1">대한민국</div>
          <div class="mt-2 text-[10px] font-bold text-neutral-400 bg-neutral-100 dark:bg-neutral-800 px-2 py-0.5 rounded-full inline-block">Coming Soon</div>

          <div class="font-semibold text-sm md:text-base">Australia</div>
          <div class="text-xs text-neutral-400 mt-1">AU</div>
          <div class="mt-2 text-[10px] font-bold text-neutral-400 bg-neutral-100 dark:bg-neutral-800 px-2 py-0.5 rounded-full inline-block">Coming Soon</div>
        </button>

        <!-- 🇨🇦 Canada — COMING SOON -->
        <button onclick="comingSoon('Canada')" class="country-card soon bg-neutral-50 dark:bg-brand-dark-card border border-neutral-200 dark:border-brand-dark-border rounded-xl p-4 md:p-5 text-center">
          <div class="text-3xl md:text-4xl mb-2">🇨🇦</div>
          <div class="font-semibold text-sm md:text-base">Canada</div>
          <div class="text-xs text-neutral-400 mt-1">CA</div>
          <div class="mt-2 text-[10px] font-bold text-neutral-400 bg-neutral-100 dark:bg-neutral-800 px-2 py-0.5 rounded-full inline-block">Coming Soon</div>
        </button>

        <!-- 🇩🇪 Germany — COMING SOON -->
        <button onclick="comingSoon('Germany')" class="country-card soon bg-neutral-50 dark:bg-brand-dark-card border border-neutral-200 dark:border-brand-dark-border rounded-xl p-4 md:p-5 text-center">

        <button onclick="comingSoon('France')" class="country-card soon bg-neutral-50 dark:bg-brand-dark-card border border-neutral-200 dark:border-brand-dark-border rounded-xl p-4 md:p-5 text-center">
          <div class="text-3xl md:text-4xl mb-2">🇫🇷</div>
          <div class="font-semibold text-sm md:text-base">France</div>
          <div class="text-xs text-neutral-400 mt-1">FR</div>

        <!-- 🌍 Other — COMING SOON -->

          <div class="text-3xl md:text-4xl mb-2">🌍</div>
          <div class="font-semibold text-sm md:text-base">Other</div>
          <div class="text-xs text-neutral-400 mt-1">More countries</div>

      </div>

      <!-- Info text -->
      <p class="text-neutral-400 text-xs mt-8 fade-in fade-in-d3">
        More countries being added regularly. Currently available: <span class="text-brand-red font-semibold">Sri Lanka</span>
      </p>
    </div>
  </main>


  <!-- =============================================
       FOOTER (Simple)
       ============================================= -->
  <footer class="bg-neutral-900 dark:bg-black border-t border-neutral-800">
    <div class="max-w-7xl mx-auto px-4 md:px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="text-2xl font-extrabold tracking-tight">
        <span class="text-brand-red">Global</span><span class="text-white">Law</span>
      </div>
      <p class="text-neutral-500 text-xs text-center">
        Copyright © 2026 GlobalLaw. All Rights Reserved.
      </p>
      <p class="text-neutral-500 text-xs">
        Powered by <a href="https://vezlo.dev" target="_blank" rel="noopener" class="text-brand-red hover:underline font-semibold">Vezlo</a>
      </p>
    </div>
  </footer>


  <!-- =============================================
       TOAST NOTIFICATION
       ============================================= -->
  <div id="toast" class="hidden fixed top-20 right-4 z-[90] bg-white dark:bg-brand-dark-card border border-neutral-200 dark:border-brand-dark-border rounded-xl shadow-2xl px-5 py-3.5 toast-slide max-w-sm">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-yellow-100 dark:bg-yellow-900/30 flex items-center justify-center shrink-0">
        <i data-lucide="clock" class="w-4 h-4 text-yellow-600 dark:text-yellow-400"></i>
      </div>
      <p id="toastMessage" class="text-sm font-medium"></p>
    </div>
  </div>


  <!-- =============================================
       JAVASCRIPT
       ============================================= -->
  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // =============================================
    // DARK MODE
    // =============================================
    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('gl_dark', isDark);
    }

    // Apply saved dark mode preference
    if (localStorage.getItem('gl_dark') === 'true' ||
        (!localStorage.getItem('gl_dark') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }

    // =============================================
    // COUNTRY NAVIGATION
    // =============================================

    /**
     * Navigate to a country's file
     * @param {string} file - The HTML file to navigate to (e.g., 'lk.html')
     *
     * DEVELOPER NOTE:
     * When you create a new country file (e.g., 'us.html'),
     * change that country's button from:
     *   onclick="comingSoon('United States')"
     * to:
     *   onclick="goToCountry('us.html')"
     * And remove the 'soon' class, add 'available' class instead.
     */
    function goToCountry(file) {
      window.location.href = file;
    }

    /**
     * Show "Coming Soon" toast for countries without files yet
     * @param {string} countryName - Name of the country to display in toast
     */
    function comingSoon(countryName) {
      showToast(countryName + ' is coming soon! 🚧');
    }

    // =============================================
    // TOAST NOTIFICATION
    // =============================================
    let toastTimeout = null;

    function showToast(message) {
      const toast = document.getElementById('toast');
      const msg = document.getElementById('toastMessage');
      msg.textContent = message;
      toast.classList.remove('hidden');

      // Clear previous timeout
      if (toastTimeout) clearTimeout(toastTimeout);

      // Auto hide after 3 seconds
      toastTimeout = setTimeout(function() {
        toast.classList.add('hidden');
      }, 3000);
    }
  </script>

</body>
</html>
